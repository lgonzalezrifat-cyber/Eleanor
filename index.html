<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collage de Eleanor</title>
    <style>
        :root {
            --verde-eleanor: #2ecc71;
            --verde-oscuro: #27ae60;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .background-dots {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a1a1a 10%, transparent 10%);
            background-size: 30px 30px;
            z-index: -2;
            animation: move 4s linear infinite;
        }

        @keyframes move {
            from { background-position: 0 0; }
            to { background-position: 30px 30px; }
        }

        /* --- ESTRELLAS CAYENDO --- */
        .estrella {
            position: fixed;
            top: -50px;
            color: var(--verde-eleanor);
            font-size: 20px;
            user-select: none;
            z-index: 0; 
            filter: drop-shadow(0 0 5px var(--verde-eleanor));
            animation: caida linear infinite;
        }

        @keyframes caida {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 0 50px rgba(46, 204, 113, 0.2);
            border: 1px solid #333;
            max-width: 500px;
            width: 90%;
            z-index: 10;
        }

        h1 {
            color: var(--verde-eleanor);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .marco-foto {
            width: 280px; 
            height: 380px;
            margin: 0 auto;
            border: 8px solid var(--verde-eleanor);
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(46, 204, 113, 0.5);
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marco-foto img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.8s ease-in-out;
        }

        #btn-iniciar {
            padding: 15px 35px;
            font-size: 1.2rem;
            background: var(--verde-eleanor);
            color: black;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .mensaje {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #eee;
            font-weight: 500;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="background-dots"></div>
    <div id="contenedor-estrellas"></div>

    <div class="container">
        <div id="inicio">
            <h1>Collage de Eleanor</h1>
            <button id="btn-iniciar">¡FELIZ CUMPLEAÑOS! 🎂</button>
            <p style="font-size: 0.8rem; margin-top: 10px; color: #666;">(Asegúrate de tener el volumen alto)</p>
        </div>

        <div id="reproductor" class="hidden">
            <h1>Collage de Eleanor</h1>
            <div class="marco-foto">
                <img id="foto-actual" src="1.jpg" alt="Eleanor">
            </div>
            <div class="mensaje" id="texto-mensaje">¡Felicidades Eleanor!</div>
        </div>
    </div>

    <audio id="musica" loop preload="auto">
        <source src="cancion.mp3" type="audio/mpeg">
        Tu navegador no soporta el audio.
    </audio>

    <script>
        const btn = document.getElementById('btn-iniciar');
        const pantallaInicio = document.getElementById('inicio');
        const pantallaReproductor = document.getElementById('reproductor');
        const imgElement = document.getElementById('foto-actual');
        const txtElement = document.getElementById('texto-mensaje');
        const musica = document.getElementById('musica');
        const contenedorEstrellas = document.getElementById('contenedor-estrellas');

        const frases = [
            "¡Feliz Cumpleaños, Eleanor!",
            "Con mucho cariño de tu tío Kiki ❤️",
            "Hoy es un día muy especial 🌟",
            "Eres una niña increíble ✨",
            "¡Que todos tus sueños se cumplan!",
            "¡Disfruta mucho tu día! 🎈",
            "¡A soplar las velitas! 🎂",
            "Crea recuerdos inolvidables",
            "Te queremos muchísimo",
            "¡Que viva la cumpleañera! 🥳"
        ];

        function crearEstrella() {
            const estrella = document.createElement('div');
            estrella.className = 'estrella';
            estrella.innerHTML = '★';
            estrella.style.left = Math.random() * 100 + 'vw';
            estrella.style.animationDuration = (Math.random() * 2 + 2) + 's'; 
            estrella.style.fontSize = (Math.random() * 15 + 15) + 'px';
            
            contenedorEstrellas.appendChild(estrella);
            setTimeout(() => { estrella.remove(); }, 4000);
        }

        // FUNCIÓN CLAVE PARA LA MÚSICA
        function reproducirMusica() {
            musica.play().then(() => {
                console.log("Música reproduciéndose correctamente");
            }).catch(error => {
                console.log("El navegador bloqueó el audio, intentando de nuevo...");
            });
        }

        btn.addEventListener('click', () => {
            pantallaInicio.classList.add('hidden');
            pantallaReproductor.classList.remove('hidden');
            
            // Forzamos la reproducción al hacer click
            reproducirMusica();
            
            setInterval(crearEstrella, 250);
            iniciarCarrusel();
        });

        // Si falla, cualquier otro toque en la pantalla activará la música
        document.body.addEventListener('touchstart', reproducirMusica, {once: true});
        document.body.addEventListener('click', reproducirMusica, {once: true});

        let fotoNumero = 1;
        function iniciarCarrusel() {
            setInterval(() => {
                imgElement.style.opacity = 0;
                setTimeout(() => {
                    fotoNumero = (fotoNumero % 10) + 1;
                    imgElement.src = fotoNumero + ".jpg";
                    txtElement.innerText = frases[fotoNumero - 1];
                    imgElement.style.opacity = 1;
                }, 800);
            }, 4000);
        }
    </script>
</body>
</html>
